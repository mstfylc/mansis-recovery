<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fundra Desktop - Giriş</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
      }

      .login-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        width: 400px;
        max-width: 90%;
        -webkit-app-region: no-drag;
      }

      .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }

      .login-header h1 {
        font-size: 28px;
        margin-bottom: 5px;
        font-weight: 600;
      }

      .login-header p {
        font-size: 14px;
        opacity: 0.9;
      }

      .login-body {
        padding: 40px 30px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-size: 14px;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.3s ease;
        outline: none;
      }

      .form-group input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-group input:disabled {
        background: #f5f5f5;
        cursor: not-allowed;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        margin: 15px 0;
        padding: 12px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-right: 10px;
        cursor: pointer;
      }

      .checkbox-group label {
        margin: 0;
        color: #555;
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        flex: 1;
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-message {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .error-message.show {
        display: block;
        animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .window-controls {
        position: absolute;
        top: 15px;
        right: 15px;
        display: flex;
        gap: 10px;
        -webkit-app-region: no-drag;
      }

      .window-btn {
        width: 30px;
        height: 30px;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        font-size: 18px;
      }

      .window-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .help-text {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 12px;
      }

      .version-text {
        text-align: center;
        margin-top: 15px;
        color: #999;
        font-size: 11px;
      }
    </style>
    <script type="module" crossorigin src="./assets/login-AjojVwt5.js"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="window-controls">
          <button class="window-btn" id="minimizeBtn" title="Minimize">
            −
          </button>
          <button class="window-btn" id="closeBtn" title="Close">×</button>
        </div>
        <h1>Fundra Desktop</h1>
        <p>Yazdırma Yönetim Sistemi</p>
      </div>

      <div class="login-body">
        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="userLoginData">E-posta veya Telefon</label>
            <input
              type="text"
              id="userLoginData"
              name="userLoginData"
              placeholder="ornek@email.com veya 5551234567"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Şifre</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>

          <div
            class="checkbox-group"
            id="autoLaunchGroup"
            style="display: none"
          >
            <input type="checkbox" id="autoLaunch" checked />
            <label for="autoLaunch"
              >Bilgisayar açıldığında otomatik başlat</label
            >
          </div>

          <button type="submit" class="btn" id="loginBtn">Giriş Yap</button>
        </form>

        <div class="help-text">
          Lütfen Fundra hesap bilgilerinizle giriş yapın
        </div>

        <div class="version-text">v1.0.9</div>
      </div>
    </div>

  </body>
</html>
